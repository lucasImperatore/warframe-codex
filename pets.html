<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe Codex Ultra - Pets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Codex de Companheiros</h1>
    
    <div class="search-container">
        <input type="text" id="wfInput" list="petOptions" placeholder="Digite o nome do Pet (ex: Carrier, Helios, Kubrow)...">
            <datalist id="petOptions">
                <option value="Carrier Prime">
                <option value="Helios Prime">
                <option value="Smeeta">
                <option value="Adarza">
                <option value="Huras">
                <option value="Djinn">
                <option value="Deathcube">
            </datalist>
        <button id="searchBtn">PESQUISAR</button>
    </div>

    <div id="status-msg"></div>

    <div id="result-container">
        <div class="hero-section">
            <img id="wf-image" src="" alt="">

            <div class="info-main">
                <span id="wf-type" class="wf-type"></span>
                <h2 id="wf-name" class="wf-title"></h2>
                <p id="wf-desc" class="wf-desc"></p>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">SAÚDE</span>
                <span id="stat-health"></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ESCUDO</span>
                <span id="stat-shield"></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ARMADURA</span>
                <span id="stat-armor"></span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ESTILO</span>
                <span id="stat-energy"></span>
            </div>
        </div>
        <br>
        <br>
        <div>
            <a href="index.html">
                <button>WARFRAMES</button>
            </a>
            <a href="weapons.html">
                <button>ARMAS</button>
            </a>
        </div>
    </div>
    <script src="pets.js"></script>
</body>
</html>
